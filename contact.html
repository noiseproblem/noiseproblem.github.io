<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Contact Lauren Tate Baeza." />
    <title>Contact — Lauren Tate Baeza</title>
    <link rel="stylesheet" href="https://use.typekit.net/dpu7jbx.css" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="wrap">
        <a class="nav-home" href="index.html">Home</a>
        <nav aria-label="Primary">
          <ul class="nav__list">
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="is-active">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main">
      <div class="wrap">
        <h1 class="contact-heading">For inquires, please use the contact form below.</h1>

        <form class="contact-form" action="#" method="POST" novalidate>
          <div class="form-group">
            <span class="form-group__label">Name</span>
            <div class="form-row">
              <div class="form-field">
                <label for="first-name">First Name <span class="required">(required)</span></label>
                <input type="text" id="first-name" name="first_name" required />
              </div>
              <div class="form-field">
                <label for="last-name">Last Name <span class="required">(required)</span></label>
                <input type="text" id="last-name" name="last_name" required />
              </div>
            </div>
          </div>

          <div class="form-field">
            <label for="email">Email <span class="required">(required)</span></label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="form-field">
            <label for="subject">Subject <span class="required">(required)</span></label>
            <input type="text" id="subject" name="subject" required />
          </div>

          <div class="form-field">
            <label for="message">Message <span class="required">(required)</span></label>
            <textarea id="message" name="message" required></textarea>
          </div>

          <button type="submit" class="contact-submit">Submit</button>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <div class="wrap">
        <p class="site-footer__note">
          <span class="site-footer__name">Lauren Tate Baeza.</span>
          <span class="site-footer__copy">Copyright 2026</span>
        </p>
      </div>
    </footer>

    <script src="js/main.js" defer></script>
  </body>
</html>
